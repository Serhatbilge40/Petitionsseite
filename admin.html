<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Unterschriften verwalten</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a7f5a;
      --primary-light: #e6f5ef;
      --primary-dark: #14634a;
      --text: #1a1a2e;
      --text-mid: #4a4a68;
      --text-light: #7c7c96;
      --bg: #fafbfc;
      --white: #ffffff;
      --border: #e8e8ee;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --danger: #e53e3e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: .5rem;
      color: var(--primary-dark);
    }

    /* Login Screen */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }

    .login-box {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .login-box h1 { margin-bottom: .25rem; }
    .login-box p { color: var(--text-mid); font-size: .9rem; margin-bottom: 1.5rem; }

    .login-box input[type="password"] {
      width: 100%;
      padding: .85rem 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: .75rem;
      transition: border-color .2s;
    }

    .login-box input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .login-error {
      color: var(--danger);
      font-size: .85rem;
      margin-bottom: .75rem;
      display: none;
    }

    .btn {
      width: 100%;
      padding: .85rem 1.5rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    /* Admin Dashboard */
    #admin-panel { display: none; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stats {
      font-size: .95rem;
      color: var(--text-mid);
    }

    .stats strong {
      color: var(--primary-dark);
      font-size: 1.5rem;
    }

    .actions {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .btn-sm {
      padding: .6rem 1.2rem;
      font-size: .85rem;
      border-radius: var(--radius-sm);
      border: 2px solid var(--primary);
      background: var(--white);
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-sm:hover { background: var(--primary); color: #fff; }

    .btn-sm.filled {
      background: var(--primary);
      color: #fff;
    }
    .btn-sm.filled:hover { background: var(--primary-dark); }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }

    th {
      background: var(--primary-light);
      color: var(--primary-dark);
      font-weight: 600;
      text-align: left;
      padding: .75rem .65rem;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }

    td {
      padding: .65rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--primary-light); }

    .comment-cell {
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .back-link {
      display: inline-block;
      margin-top: 2rem;
      color: var(--text-light);
      font-size: .85rem;
      text-decoration: none;
    }
    .back-link:hover { color: var(--primary); }

    /* Print styles */
    @media print {
      .actions, .back-link, #login-screen { display: none !important; }
      .table-wrap { box-shadow: none; }
      body { background: #fff; }
      h1 { color: #000; }
    }

    @media (max-width: 640px) {
      .top-bar { flex-direction: column; align-items: flex-start; }
      table { font-size: .78rem; }
      th, td { padding: .5rem .4rem; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <div class="login-box">
      <h1>🔒 Admin</h1>
      <p>Passwort eingeben, um die Unterschriften einzusehen.</p>
      <input type="password" id="admin-pw" placeholder="Passwort" autofocus
        onkeydown="if(event.key==='Enter') adminLogin()">
      <div class="login-error" id="login-error">Falsches Passwort</div>
      <button class="btn" onclick="adminLogin()" id="login-btn">Einloggen</button>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel" class="container">
    <div class="top-bar">
      <div>
        <h1>Unterschriften</h1>
        <div class="stats"><strong id="total-count">–</strong> Unterschriften gesammelt</div>
      </div>
      <div class="actions">
        <button class="btn-sm" onclick="downloadCSV()">📥 CSV</button>
        <button class="btn-sm" onclick="window.print()">🖨 Drucken / PDF</button>
      </div>
    </div>

    <div class="table-wrap">
      <table id="sig-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Vorname</th>
            <th>Nachname</th>
            <th>E-Mail</th>
            <th>Matrikel-Nr.</th>
            <th>Fachbereich</th>
            <th>Semester</th>
            <th>Kommentar</th>
            <th>Datum</th>
          </tr>
        </thead>
        <tbody id="sig-body"></tbody>
      </table>
    </div>

    <a href="index.html" class="back-link">← Zurück zur Petition</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    let signaturesData = [];

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('de-DE', {
        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    async function adminLogin() {
      const pw = document.getElementById('admin-pw').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      if (!pw) { errEl.style.display = 'block'; errEl.textContent = 'Bitte Passwort eingeben'; return; }

      btn.disabled = true;
      btn.textContent = 'Prüfe…';
      errEl.style.display = 'none';

      const { data, error } = await db.rpc('get_admin_signatures', { pw });

      btn.disabled = false;
      btn.textContent = 'Einloggen';

      if (error) {
        errEl.style.display = 'block';
        if (error.message && error.message.includes('Falsches Passwort')) {
          errEl.textContent = 'Falsches Passwort';
        } else {
          errEl.textContent = 'Fehler: ' + (error.message || error.hint || 'Unbekannter Fehler');
        }
        console.error('Admin error:', error);
        return;
      }

      signaturesData = data || [];
      showAdminPanel();
    }

    function showAdminPanel() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      document.getElementById('total-count').textContent = signaturesData.length;

      const tbody = document.getElementById('sig-body');
      tbody.innerHTML = signaturesData.map((s, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${esc(s.first_name)}</td>
          <td>${esc(s.last_name)}</td>
          <td>${esc(s.email)}</td>
          <td>${esc(s.matrikelnummer)}</td>
          <td>${esc(s.fach)}</td>
          <td>${esc(s.semester)}</td>
          <td class="comment-cell" title="${esc(s.comment)}">${esc(s.comment)}</td>
          <td style="white-space:nowrap">${formatDate(s.signed_at)}</td>
        </tr>
      `).join('');
    }

    function downloadCSV() {
      if (!signaturesData.length) return;

      const headers = ['Nr', 'Vorname', 'Nachname', 'E-Mail', 'Matrikelnummer', 'Fachbereich', 'Semester', 'Kommentar', 'Datum'];
      const csvContent = [
        headers.join(';'),
        ...signaturesData.map((s, i) => [
          i + 1,
          csvSafe(s.first_name),
          csvSafe(s.last_name),
          csvSafe(s.email),
          csvSafe(s.matrikelnummer),
          csvSafe(s.fach),
          csvSafe(s.semester),
          csvSafe(s.comment),
          formatDate(s.signed_at)
        ].join(';'))
      ].join('\n');

      const BOM = '\uFEFF';
      const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `unterschriften_${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function csvSafe(val) {
      if (!val) return '';
      const s = String(val);
      if (s.includes(';') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }
  </script>
</body>
</html>
